<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Jajoflo Studio is an independent development studio creating high-quality, useful applications for the Android ecosystem.">
    <meta name="keywords" content="Jajoflo Studio, Android developer, mobile apps, ClearSight AI, Skribo">
    <title>Jajoflo Studio</title>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Jajoflo Studio",
      "url": "https://jajoflo.github.io/",
      "email": "jajoflodev@gmail.com",
      "logo": "https://jajoflo.github.io/clearsight-logo.png"
    }
    </script>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
        }

        .container {
            text-align: center;
        }

        a {
            display: inline-block;
            margin: 10px;
            padding: 15px 30px;
            border-radius: 5px;
            text-decoration: none;
            color: #ffffff;
            background-color: #00e5ff;
            font-size: 1.2em;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Welcome to Jajoflo Studio / Bienvenue chez Jajoflo Studio</h1>
        <p>Please select your language / Veuillez sélectionner votre langue :</p>
        <a href="/en.html" lang="en">English</a>
        <a href="/fr.html" lang="fr">Français</a>
    </div>
    <script>
        const userLang = navigator.language || navigator.userLanguage;
        if (userLang.startsWith('fr')) {
            window.location.href = '/fr.html';
        } else {
            window.location.href = '/en.html';
        }
    </script>
</body>

</html>
