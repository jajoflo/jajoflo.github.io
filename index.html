<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jajoflo Studio</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
        }
        .container {
            text-align: center;
        }
        a {
            display: inline-block;
            margin: 10px;
            padding: 15px 30px;
            border-radius: 5px;
            text-decoration: none;
            color: #ffffff;
            background-color: #00e5ff;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Jajoflo Studio / Bienvenue chez Jajoflo Studio</h1>
        <p>Please select your language / Veuillez sélectionner votre langue :</p>
        <a href="/en.html" lang="en">English</a>
        <a href="/fr.html" lang="fr">Français</a>
    </div>
    <script>
        const userLang = navigator.language || navigator.userLanguage;
        if (userLang.startsWith('fr')) {
            window.location.href = '/fr.html';
        } else {
            window.location.href = '/en.html';
        }
    </script>
</body>
</html>
